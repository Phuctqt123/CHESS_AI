<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/vendor/chessboard.min.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>GrandMaster AI | Professional Chess Engine</title>
</head>

<body>
    <div class="app-background"></div>
    <div class="glass-container">
        <header>
            <div class="logo">
                <i class="fas fa-chess-knight"></i>
                <div class="brand">
                    <h1>GrandMaster AI</h1>
                    <span class="tagline">Neural Strategy Engine v2.0</span>
                </div>
            </div>
            <div class="status-badge" id="status-badge">
                <span class="status-dot"></span>
                <span id="status-text">Your Turn (White)</span>
            </div>
        </header>

        <main>
            <section class="board-container">
                <div class="board" id="board"></div>
            </section>

            <aside class="side-panel">
                <div class="card control-card">
                    <h3><i class="fas fa-sliders-h"></i> Engine Settings</h3>
                    
                    <div class="setup-group">
                        <label>Game Mode:</label>
                        <select id="game-mode" class="custom-select">
                            <option value="pve">Player vs AI (PvE)</option>
                            <option value="eve">AI vs AI (EvE)</option>
                        </select>
                    </div>

                    <div id="pve-setup" class="setup-subgroup">
                        <label>AI Algorithm:</label>
                        <select id="difficulty-select" class="custom-select">
                            <option value="mcts">MCTS (Strategic)</option>
                            <option value="alphabeta" selected>Alpha-Beta (Tactical)</option>
                            <option value="genetic">Alpha-Beta + Genetic (Advanced)</option>
                        </select>
                    </div>

                    <div id="eve-setup" class="setup-subgroup" style="display: none;">
                        <div style="margin-bottom: 10px;">
                            <label>White (AI):</label>
                            <select id="white-algo" class="custom-select">
                                <option value="alphabeta">Alpha-Beta (Tactical)</option>
                                <option value="mcts">MCTS (Strategic)</option>
                                <option value="genetic">Alpha-Beta + Genetic (Advanced)</option>
                            </select>
                        </div>
                        <div>
                            <label>Black (AI):</label>
                            <select id="black-algo" class="custom-select">
                                <option value="mcts">MCTS (Strategic)</option>
                                <option value="alphabeta" selected>Alpha-Beta (Tactical)</option>
                                <option value="genetic">Alpha-Beta + Genetic (Advanced)</option>
                            </select>
                        </div>
                    </div>

                    <div class="setting-item" style="margin-top: 15px;">
                        <div class="setting-label">
                            <label for="depth-slider">Search Depth: <span id="depth-value">3</span></label>
                            <i class="fas fa-info-circle info-icon" title="Higher depth means stronger play but takes longer to compute."></i>
                        </div>
                        <input type="range" id="depth-slider" min="1" max="10" value="3" class="slider" />
                        <p class="setting-description" style="margin-top: 5px;">Higher depth = Smarter but Slower moves.</p>
                    </div>

                    <div class="button-grid" style="margin-top: 20px;">
                        <button id="start-btn" class="primary-btn" title="Restart Game">
                            <i class="fas fa-redo"></i> Reset Match
                        </button>
                        <button class="flip-board secondary-btn" title="Flip Board perspective">
                            <i class="fas fa-sync-alt"></i> Flip View
                        </button>
                        <button class="switch-sides secondary-btn" title="Play for the other side">
                            <i class="fas fa-exchange-alt"></i> Switch Sides
                        </button>
                        <button class="bot-v-bot primary-btn" title="Watch AI play itself">
                            <i class="fas fa-robot"></i> Bot vs Bot
                        </button>
                        
                        <button id="btn-stop" class="danger-btn" style="display:none; background: #ef4444; color: white; border: none; padding: 12px 16px; border-radius: 12px; grid-column: span 2; font-weight: 600; cursor: pointer;">
                            <i class="fas fa-stop"></i> Stop AI
                        </button>
                    </div>
                </div>

                <div class="card history-card">
                    <h3><i class="fas fa-history"></i> Move History</h3>
                    <div id="move-history" class="move-history">
                        <div class="history-placeholder">Waiting for the first move...</div>
                    </div>
                </div>
            </aside>
        </main>

        <footer>
            <p>&copy; 2026 GrandMaster AI System &bull; Engine powered by <strong style="color: var(--primary);">Group 9 (Alpha-Beta, MCTS & Genetic)</strong></p>
        </footer>
    </div>

    <div id="promotion-modal" class="modal">
        <div class="modal-content">
            <h3>Choose Promotion</h3>
            <div class="promotion-options">
                <div class="promotion-option" data-piece="q">
                    <img src="/static/img/chesspieces/wikipedia/wQ.png" alt="Queen" id="promo-q">
                    <span>Queen</span>
                </div>
                <div class="promotion-option" data-piece="r">
                    <img src="/static/img/chesspieces/wikipedia/wR.png" alt="Rook" id="promo-r">
                    <span>Rook</span>
                </div>
                <div class="promotion-option" data-piece="b">
                    <img src="/static/img/chesspieces/wikipedia/wB.png" alt="Bishop" id="promo-b">
                    <span>Bishop</span>
                </div>
                <div class="promotion-option" data-piece="n">
                    <img src="/static/img/chesspieces/wikipedia/wN.png" alt="Knight" id="promo-n">
                    <span>Knight</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="{{ url_for('static', filename='js/vendor/chessboard.min.js') }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
