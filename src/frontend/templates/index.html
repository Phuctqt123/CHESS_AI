<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/vendor/chessboard.min.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>GrandMaster AI | Professional Chess Engine</title>
</head>

<body>
    <div class="app-background"></div>
    <div class="glass-container">
        <header>
            <div class="logo">
                <i class="fas fa-chess-knight"></i>
                <div class="brand">
                    <h1>GrandMaster AI</h1>
                    <span class="tagline">Neural Strategy Engine v2.0</span>
                </div>
            </div>
            <div class="status-badge" id="status-badge">
                <span class="status-dot"></span>
                <span id="status-text">Your Turn (White)</span>
            </div>
        </header>

        <main>
            <section class="board-container">
                <div class="board" id="board"></div>
            </section>

            <aside class="side-panel">
                    <div class="card settings-card">
                        <h3><i class="fas fa-robot"></i> AI Configuration</h3>

                        <div class="setting-group">
                            <label><b>White:</b></label>
                            <select id="white-algo" class="select-style">
                                <option value="none">Player (Human)</option>
                                <option value="alpha_beta">Alpha-Beta (Tactical)</option>
                                <option value="mcts">MCTS (Strategic)</option>
                            </select>
                            <div class="slider-container">
                                <div class="slider-label-row">
                                    <span id="white-val-label">Depth: 3</span>
                                </div>
                                <input type="range" id="white-slider" min="1" max="10" value="3" class="full-width-slider">
                            </div>
                        </div>

                        <div class="setting-group">
                            <label><b>Black:</b></label>
                            <select id="black-algo" class="select-style">
                                <option value="alpha_beta">Alpha-Beta (Tactical)</option>
                                <option value="mcts">MCTS (Strategic)</option>
                                <option value="none">Player (Human)</option>
                            </select>
                            <div class="slider-container">
                                <div class="slider-label-row">
                                    <span id="black-val-label">Depth: 4</span>
                                </div>
                                <input type="range" id="black-slider" min="1" max="10" value="4" class="full-width-slider">
                            </div>
                        </div>
                    </div>

                    <div class="card control-card">
                        <h3><i class="fas fa-gamepad"></i> Game Controls</h3>
                        <div class="button-grid">
                            <button id="btn-restart" class="primary-btn"><i class="fas fa-redo"></i> Restart</button>
                            <button id="btn-switch" class="secondary-btn"><i class="fas fa-exchange-alt"></i> Switch Sides</button>
                            <button id="btn-ai-vs-ai" class="accent-btn"><i class="fas fa-swords"></i> AI vs AI</button>
                            <button id="btn-stop" class="danger-btn" style="display:none;"><i class="fas fa-stop"></i> Stop AI</button>
                        </div>
                    </div>
                </aside>
        </main>

        <footer>
            <p>&copy; 2026 GrandMaster AI System • Engine powered by <span class="accent-text">Minimax with Alpha-Beta</span></p>
        </footer>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="{{ url_for('static', filename='js/vendor/chessboard.min.js') }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
